<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Barber & Salon | Premium Studio</title>
<meta name="robots" content="noindex">
<!-- Favicon -->
<link rel="icon" href="assets/icons/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16x16.png">

<!-- Apple -->
<link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">

<!-- Android / PWA -->
<link rel="manifest" href="assets/icons/site.webmanifest">

<!-- Theme -->
<meta name="theme-color" content="#0f0f0f">
<!-- iOS support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AI WEB">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0a0a0a;
  color:#fff;
  text-align:center;
  overflow:hidden;
}

.container{
  max-width:600px;
  padding:20px;
}

.icon{
  font-size:70px;
  margin-bottom:20px;
  animation:pulse 2s infinite;
}

h1{
  font-size:40px;
  margin-bottom:10px;
}

p{
  color:#aaa;
  margin-bottom:25px;
}

button{
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#6c63ff,#00d4ff);
  color:#fff;
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.1)}
}

/* glow background */
body::before{
  content:'';
  position:absolute;
  width:400px;
  height:400px;
  background:#6c63ff;
  filter:blur(160px);
  opacity:0.25;
  top:-120px;
  right:-120px;
}
</style>

</head>
<body>

<div class="container">
  <div class="icon">📡</div>
  <h1>No Internet Connection</h1>
  <p>You are offline. Please check your internet connection and try again.</p>
  
  <button onclick="location.reload()">Retry</button>
</div>

</body>
</html>
